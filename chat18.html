<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香星命学｜香の巫女に相談する</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --ash: #4a4440;
    --mist: #9a9490;
    --parchment: #f5f0e8;
    --cream: #faf7f2;
    --gold: #b8975a;
    --gold-light: #d4b07a;
    --border: #ddd8ce;
    --green-dark: #0a3d6b;
    --green: #1a6b3a;
    --bubble-user: #1a1410;
    --bubble-ai: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--cream);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(184,151,90,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(26,26,16,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ヘッダー */
  header {
    position: relative;
    z-index: 10;
    background: var(--ink);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(184,151,90,0.3);
  }

  .header-icon {
    width: 36px;
    height: 36px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header-icon span {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    color: var(--gold);
  }

  .header-text h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  .header-text p {
    font-size: 10px;
    color: rgba(184,151,90,0.6);
    letter-spacing: 0.05em;
    margin-top: 1px;
  }

  .chat-status {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .chat-status-badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .chat-status-badge.active {
    background: rgba(26,107,58,0.25);
    color: #7fffaa;
    border: 1px solid rgba(26,107,58,0.4);
  }

  .chat-status-badge.inactive {
    background: rgba(154,148,144,0.2);
    color: rgba(184,151,90,0.6);
    border: 1px solid rgba(154,148,144,0.3);
  }

  .chat-status-expire {
    font-size: 9px;
    color: rgba(184,151,90,0.85);
  }

  /* チャットエリア */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  /* メッセージバブル */
  .msg-wrap {
    display: flex;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.user {
    justify-content: flex-end;
    padding-left: 8%;
  }

  .msg-wrap.ai {
    justify-content: flex-start;
    gap: 8px;
  }

  .ai-avatar {
    width: 32px;
    height: 32px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--ink);
    margin-top: 2px;
  }

  .ai-avatar span {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    color: var(--gold);
  }

  .bubble {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.8;
    letter-spacing: 0.03em;
    word-break: break-all;
  }

  .bubble.ai.gogyo-today {
    background: transparent;
    border: none;
    padding: 0;
    font-size: 13.5px;
    color: var(--ash);
    letter-spacing: 0.04em;
    line-height: 1.9;
  }

  .bubble.ai.closing-word {
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 0.08em;
    font-family: 'Shippori Mincho', serif;
    opacity: 0.85;
    margin-top: 2px;
  }

  .bubble.user {
    background: #ffffff;
    color: var(--ink);
    border: 1.5px solid var(--border);
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    min-width: 80px;
    width: fit-content;
    max-width: 100%;
    word-break: break-all;
  }

  .msg-wrap.user > div {
    max-width: 82%;
  }

  .bubble.ai {
    background: transparent;
    color: var(--ink);
    border: none;
    border-radius: 0;
    box-shadow: none;
    padding: 0;
    max-width: 100%;
    font-size: 13.5px;
    line-height: 1.9;
    letter-spacing: 0.03em;
  }

  .bubble.ai strong {
    font-weight: 600;
  }

  .bubble.ai em {
    font-style: italic;
    color: var(--ash);
  }

  /* AI返答ラッパー */
  .msg-wrap.ai {
    padding-right: 4%;
  }

  .ai-body {
    flex: 1;
    padding: 4px 0 2px 0;
  }

  .bubble-time {
    font-size: 10px;
    color: var(--mist);
    margin-top: 4px;
    text-align: right;
  }

  .msg-wrap.ai .bubble-time {
    text-align: left;
    margin-left: 40px;
  }

  /* タイピングインジケーター */
  .typing-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: flex-start;
  }

  .typing-bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-bubble span {
    width: 6px;
    height: 6px;
    background: var(--mist);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* 区切り線 */
  .divider {
    text-align: center;
    margin: 20px 0;
    position: relative;
  }

  .divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    background: var(--cream);
    padding: 0 12px;
    font-size: 11px;
    color: var(--mist);
    position: relative;
    letter-spacing: 0.05em;
  }

  /* お試し残り回数 */
  .trial-notice {
    text-align: center;
    padding: 8px 16px;
    background: rgba(184,151,90,0.08);
    border: 1px solid rgba(184,151,90,0.2);
    border-radius: 8px;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }

  /* 入力エリア */
  #input-area {
    position: relative;
    z-index: 10;
    background: var(--cream);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }

  .input-inner {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    transition: border-color 0.2s;
  }

  .input-inner:focus-within {
    border-color: var(--gold);
  }

  #msg-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--ink);
    background: transparent;
    resize: none;
    max-height: 100px;
    line-height: 1.6;
  }

  #msg-input::placeholder {
    color: var(--mist);
    font-size: 13px;
  }

  #send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  #send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #send-btn:not(:disabled):active {
    transform: scale(0.92);
  }

  #send-btn svg {
    width: 16px;
    height: 16px;
  }

  /* ローディング */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--mist);
    font-size: 13px;
  }

  .loading-mark {
    width: 48px;
    height: 48px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 2s infinite;
  }

  .loading-mark span {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    color: var(--gold);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(184,151,90,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(184,151,90,0); }
  }

  /* エラー */
  #error-msg {
    display: none;
    text-align: center;
    padding: 40px 24px;
    color: var(--ash);
    font-size: 13px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<header>
  <div class="header-icon"><span>香</span></div>
  <div class="header-text">
    <h1>香の巫女に相談する</h1>
    <p>この対話はあなただけのものです</p>
  </div>
  <div class="chat-status">
    <span class="chat-status-badge inactive" id="chat-status-badge">未加入</span>
    <span class="chat-status-expire" id="chat-status-expire"></span>
  </div>
</header>

<div id="chat-area">
  <div id="loading">
    <div class="loading-mark"><span>香</span></div>
    <span>つながっています…</span>
  </div>
  <div id="error-msg">
    <p>接続できませんでした。<br>マイページから再度お試しください。</p>
  </div>
</div>

<div id="input-area" style="display:none;">
  <div class="input-inner">
    <textarea id="msg-input" rows="1" placeholder="心の中にあることを話してください…" maxlength="500"></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
const LIFF_ID = '2009167670-MoFBVq6M';
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzs6k1RpPw2CgZqQmkSVBjHrXbLeO5WCuU3nKBu0Ga7TFjKyOHdfoatt7kdlMiEL4sR0Q/exec'; // ユーザー情報取得用
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwiDcr2nqVJa3U_dIRblveFdnAZjnGKkYRRNAS3OI8G7exBOs60eagkAJ1lHDjaILbOTA/exec'; // チャット用

let lineUserId = null;
let userName = null;
let isSending = false;
let lastNudgeIdx = -1;

const chatArea = document.getElementById('chat-area');
const inputArea = document.getElementById('input-area');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const loading = document.getElementById('loading');
const errorMsg = document.getElementById('error-msg');

const NUDGES = [
  '他に話したいことがあれば、聞かせてください。',
  '話せそうなことがあれば、聞かせてください。',
  '他にも感じていることがあれば、遠慮なく話してください。',
  '気になることがあれば、何でも聞かせてください。',
  'ここで話せることは、話してしまっていいんですよ。'
];

function pickNudge() {
  let idx;
  do { idx = Math.floor(Math.random() * NUDGES.length); } while (idx === lastNudgeIdx);
  lastNudgeIdx = idx;
  return NUDGES[idx];
}

// 締めの言葉（香星命学の世界観）
const CLOSINGS = [
  'あなたの香運がめぐりますように🕯️',
  'あなたの香が、正しく整いますように🌿',
  '香運は、あなたの中にすでにあります🕯️',
  '今日の香命が、あなたを正しい場所へ導きますように✨',
  'あなたの香が、内側へ還っていきますように🌿',
  '香の調べが、あなたの中心へと届きますように🕯️',
  '自らの香を感じる一日を🌿',
  '香の流れに乗って、今日も進んでいけますように🌊',
  '香りが、あなたを整えていきますように✨',
  'あなたの香力が、今日も輝きますように🕯️'
];
let lastClosingIdx = -1;

function pickClosing() {
  let idx;
  do { idx = Math.floor(Math.random() * CLOSINGS.length); } while (idx === lastClosingIdx);
  lastClosingIdx = idx;
  return CLOSINGS[idx];
}

// 今日の日干支を取得
function getTodayKanshi() {
  const kanStr = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const shiStr = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const base = new Date('2024-01-01T00:00:00+09:00');
  const now = new Date();
  const jstNow = new Date(now.getTime() + 9*60*60*1000);
  const diffDays = Math.floor((jstNow - base) / (24*60*60*1000));
  const idx = ((diffDays % 60) + 60) % 60;
  return kanStr[idx % 10] + shiStr[idx % 12];
}

// 今日の五香状態メッセージを生成
function getTodayGogyoMessage() {
  const kanshi = getTodayKanshi();
  const kan = kanshi[0];
  const shi = kanshi[1];
  const kanGogyo = {甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
  const gogyoName = {木:'森香（しんこう）',火:'焔香（えんこう）',土:'穏香（おんこう）',金:'澄香（ちょうこう）',水:'流香（りゅうこう）'};
  const counterName = {木:'澄香（ちょうこう）',火:'流香（りゅうこう）',土:'森香（しんこう）',金:'焔香（えんこう）',水:'穏香（おんこう）'};
  const aromaMap = {
    木: 'ラベンダー',
    火: 'ユーカリ',
    土: 'シダーウッド',
    金: 'ローズ',
    水: 'パチュリ'
  };
  const dominant = kanGogyo[kan];
  if (!dominant) return null;
  const main = gogyoName[dominant];
  const balance = counterName[dominant];
  const aroma = aromaMap[dominant];
  const pattern = Math.floor(Date.now() / 86400000) % 3;
  const aromaLine = pattern === 0
    ? `🌿 今日は${aroma}の香を、そっと感じてみてください`
    : pattern === 1
    ? `🌿 今日は${aroma}の香に、身を委ねてみてください`
    : `🌿 ${aroma}の香が、今日の調和を還します`;
  return `🕯️ 今日（${kanshi}）は${main}が強い日です。
${balance}を取り入れて、香の調和を整えましょう。
${aromaLine}`;

}
function renderMarkdown(text) {
  // **太字**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // *斜体*
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 改行 → <br>
  text = text.replace(/\n/g, '<br>');
  return text;
}

function formatTime(date) {
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  return `${h}:${m}`;
}

function addMessageWithTime(role, text, timestamp) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  if (role === 'ai') {
    const avatar = document.createElement('div');
    avatar.className = 'ai-avatar';
    avatar.innerHTML = '<span>香</span>';
    wrap.appendChild(avatar);
  }

  if (role === 'ai') {
    const body = document.createElement('div');
    body.className = 'ai-body';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai';
    bubble.innerHTML = renderMarkdown(text);
    body.appendChild(bubble);
    if (timestamp) {
      const time = document.createElement('div');
      time.className = 'bubble-time';
      try {
        const d = new Date(timestamp);
        time.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      } catch(e) { time.textContent = ''; }
      body.appendChild(time);
    }
    wrap.appendChild(body);
  } else {
    const inner = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    inner.appendChild(bubble);
    if (timestamp) {
      const time = document.createElement('div');
      time.className = 'bubble-time';
      try {
        const d = new Date(timestamp);
        time.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      } catch(e) { time.textContent = ''; }
      inner.appendChild(time);
    }
    wrap.appendChild(inner);
  }
  chatArea.appendChild(wrap);
}

function addMessage(role, text, showNudge = false) {
  const now = new Date();
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  if (role === 'ai') {
    const avatar = document.createElement('div');
    avatar.className = 'ai-avatar';
    avatar.innerHTML = '<span>香</span>';
    wrap.appendChild(avatar);
  }

  if (role === 'ai') {
    const body = document.createElement('div');
    body.className = 'ai-body';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai';
    bubble.innerHTML = renderMarkdown(text);
    body.appendChild(bubble);
    const time = document.createElement('div');
    time.className = 'bubble-time';
    time.textContent = formatTime(now);
    body.appendChild(time);
    wrap.appendChild(body);
  } else {
    const inner = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    inner.appendChild(bubble);
    const time = document.createElement('div');
    time.className = 'bubble-time';
    time.textContent = formatTime(now);
    inner.appendChild(time);
    wrap.appendChild(inner);
  }
  chatArea.appendChild(wrap);

  if (role === 'ai' && showNudge) {
    // 促し文
    setTimeout(() => {
      const nudgeWrap = document.createElement('div');
      nudgeWrap.className = 'msg-wrap ai';
      const avatar2 = document.createElement('div');
      avatar2.className = 'ai-avatar';
      avatar2.innerHTML = '<span>香</span>';
      nudgeWrap.appendChild(avatar2);
      const body2 = document.createElement('div');
      body2.className = 'ai-body';
      const nudgeBubble = document.createElement('div');
      nudgeBubble.className = 'bubble ai';
      nudgeBubble.innerHTML = renderMarkdown(pickNudge());
      body2.appendChild(nudgeBubble);
      const time2 = document.createElement('div');
      time2.className = 'bubble-time';
      time2.textContent = formatTime(new Date());
      body2.appendChild(time2);
      nudgeWrap.appendChild(body2);
      chatArea.appendChild(nudgeWrap);
      scrollToBottom();
    }, 800);

    // 締めの言葉（3回に1回の確率でランダムに表示）
    if (Math.random() < 0.33) {
      setTimeout(() => {
        const closingWrap = document.createElement('div');
        closingWrap.className = 'msg-wrap ai';
        const avatar3 = document.createElement('div');
        avatar3.className = 'ai-avatar';
        avatar3.innerHTML = '<span>香</span>';
        closingWrap.appendChild(avatar3);
        const body3 = document.createElement('div');
        body3.className = 'ai-body';
        const closingBubble = document.createElement('div');
        closingBubble.className = 'bubble ai closing-word';
        closingBubble.innerHTML = pickClosing();
        body3.appendChild(closingBubble);
        closingWrap.appendChild(body3);
        chatArea.appendChild(closingWrap);
        scrollToBottom();
      }, 1400);
    }
  }

  scrollToBottom();
}

function showTyping() {
  const typingWrap = document.createElement('div');
  typingWrap.className = 'typing-wrap';
  typingWrap.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'ai-avatar';
  avatar.innerHTML = '<span>香</span>';
  typingWrap.appendChild(avatar);

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  typingWrap.appendChild(bubble);

  chatArea.appendChild(typingWrap);
  scrollToBottom();
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isSending) return;

  isSending = true;
  sendBtn.disabled = true;
  msgInput.value = '';
  msgInput.style.height = 'auto';

  addMessage('user', text);
  showTyping();

  try {
    const rawText = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', WEBHOOK_URL, true);
      xhr.onload = () => resolve(xhr.responseText);
      xhr.onerror = () => reject(new Error('XHR failed'));
      xhr.send(JSON.stringify({ action: 'chat', lineUserId, message: text }));
    });
    let data;
    try { data = JSON.parse(rawText); } catch(e) { data = {}; }
    hideTyping();

    if (data.reply) {
      addMessage('ai', data.reply, true);
      if (data.trialRemaining !== undefined) {
        const notice = document.createElement('div');
        notice.className = 'trial-notice';
        notice.textContent = data.trialRemaining > 0
          ? `＊お試し対話 残り${data.trialRemaining}回`
          : '＊次回から本格鑑定が必要です';
        chatArea.appendChild(notice);
        scrollToBottom();
      }
    } else if (data.error === 'trial_ended') {
      addMessage('ai', '本格鑑定をご購入いただくと、1ヶ月間、香の巫女との対話が無制限でご利用いただけます🕯️', false);
    } else {
      // デバッグ用：レスポンス内容を表示
      addMessage('ai', 'DBG:' + rawText.substring(0, 200), false);
    }
  } catch(e) {
    hideTyping();
    addMessage('ai', '通信エラーが発生しました。しばらくしてから再度お試しください。', false);
  }

  isSending = false;
  sendBtn.disabled = msgInput.value.trim().length === 0;
}

// テキストエリア自動リサイズ
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  sendBtn.disabled = msgInput.value.trim().length === 0;
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// LIFF初期化
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    // ユーザー情報取得
    let data;
    try {
      const res = await fetch(`${WEBHOOK_URL}?action=getUserByLineId&lineUserId=${encodeURIComponent(lineUserId)}`);
      const text = await res.text();
      data = JSON.parse(text);
    } catch(fetchErr) {
      loading.style.display = 'none';
      errorMsg.innerHTML = 'fetch error: ' + fetchErr.toString();
      errorMsg.style.display = 'block';
      return;
    }

    loading.style.display = 'none';

    if (!data.user) {
      errorMsg.innerHTML = 'user error: ' + JSON.stringify(data);
      errorMsg.style.display = 'block';
      return;
    }

    userName = data.user.name;

    // ステータスバッジを更新
    const expire = data.user.chatExpire || '';
    const today = new Date().toISOString().slice(0,10);
    const badge = document.getElementById('chat-status-badge');
    const expireEl = document.getElementById('chat-status-expire');
    if (expire && expire !== '' && expire !== '期限切れ' && expire.replace(/-/g,'/') > today.replace(/-/g,'/')) {
      badge.textContent = '対話中';
      badge.className = 'chat-status-badge active';
      const expireDate = expire.replace('T', ' ').split(' ')[0].replace(/-/g,'/');
      expireEl.textContent = `期限 ${expireDate}`;
    } else {
      badge.textContent = '未加入';
      badge.className = 'chat-status-badge inactive';
    }

    // 過去履歴を取得
    let history = [];
    try {
      const hRes = await fetch(`${WEBHOOK_URL}?action=getChatHistory&lineUserId=${encodeURIComponent(lineUserId)}`);
      const hData = await hRes.json();
      if (hData.history) history = hData.history;
    } catch(e) {}

    // 区切り線
    const divider = document.createElement('div');
    divider.className = 'divider';
    divider.innerHTML = history.length > 0 ? '<span>過去の対話</span>' : '<span>香の巫女との対話</span>';
    chatArea.appendChild(divider);

    // 過去履歴を表示
    if (history.length > 0) {
      history.forEach(msg => {
        const role = msg.role === 'user' ? 'user' : 'ai';
        addMessageWithTime(role, msg.content, msg.timestamp);
      });
      // 区切り線（今日から）
      const divider2 = document.createElement('div');
      divider2.className = 'divider';
      divider2.innerHTML = '<span>今日の対話</span>';
      chatArea.appendChild(divider2);
    }

    // 入力エリア表示
    inputArea.style.display = 'block';

    // 最初の挨拶
    const hour = new Date().getHours();
    const greeting = hour < 11 ? 'おはようございます' : hour < 17 ? 'こんにちは' : 'こんばんは';
    // 挨拶（名前だけ）
    setTimeout(() => {
      addMessage('ai', `${greeting}、${userName}さん。`);
    }, 400);

    // 今日の五香状態を表示
    const gogyoMsg = getTodayGogyoMessage();
    if (gogyoMsg) {
      setTimeout(() => {
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap ai';
        const avatar = document.createElement('div');
        avatar.className = 'ai-avatar';
        avatar.innerHTML = '<span>香</span>';
        wrap.appendChild(avatar);
        const body = document.createElement('div');
        body.className = 'ai-body';
        const bubble = document.createElement('div');
        bubble.className = 'bubble ai gogyo-today';
        bubble.innerHTML = renderMarkdown(gogyoMsg);
        body.appendChild(bubble);
        wrap.appendChild(body);
        chatArea.appendChild(wrap);
        scrollToBottom();
      }, 900);

      // 五香の後に締めの言葉
      setTimeout(() => {
        const openings = [
          '今、心に浮かんでいることを聞かせてください。',
          '今、どのようなことが、気になっていますか。',
          '今日のお話を、聞かせてください。'
        ];
        const idx = Math.floor(Date.now() / 86400000) % openings.length;
        addMessage('ai', openings[idx]);
      }, 1800);
    } else {
      setTimeout(() => {
        const openings = [
          '今、心に浮かんでいることを聞かせてください。',
          '今、どのようなことが、気になっていますか。',
          '今日のお話を、聞かせてください。'
        ];
        const idx = Math.floor(Date.now() / 86400000) % openings.length;
        addMessage('ai', openings[idx]);
      }, 1200);
    }

  } catch(e) {
    console.error(e);
    loading.style.display = 'none';
    errorMsg.innerHTML = 'init catch: ' + e.toString();
    errorMsg.style.display = 'block';
  }
}

init();
</script>
