<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>薫音式 香星命学 鑑定書</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #2c1f14;
    --sepia:  #5c3d1e;
    --gold:   #b8975a;
    --gold2:  #d4af6a;
    --parchment: #f5ede0;
    --bg:     #ede0cc;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'Shippori Mincho', serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ローディング */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  #loading .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(184,151,90,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  #loading p { color: var(--sepia); font-size: 12px; letter-spacing: 0.1em; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* エラー */
  #error-view {
    display: none;
    min-height: 100vh;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px;
  }
  #error-view p { color: var(--sepia); font-size: 13px; line-height: 2; }

  /* メインコンテンツ */
  #reading-view { display: none; }

  /* ページ */
  .page {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background-image: url('./Beige_Floral_Vintage_Love_Letter_A4.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    padding: 52px 44px 60px;
    overflow: hidden;
  }

  /* 表紙 */
  .cover-page {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    text-align: center;
  }
  .cover-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--ink);
    margin-bottom: 28px;
  }
  .cover-divider {
    width: 60px; height: 1px;
    background: var(--gold);
    margin: 0 auto 28px;
  }
  .cover-meta { 
    font-size: 12px;
    line-height: 2.4;
    letter-spacing: 0.08em;
    color: var(--sepia);
  }
  .cover-seal {
    margin-top: 36px;
    width: 56px; height: 56px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  /* 区切り */
  .page-divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 8px 0 4px;
  }

  /* セクション */
  .section { margin-bottom: 8px; }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--sepia);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '◆';
    color: var(--gold);
    font-size: 10px;
  }
  .section-body {
    font-size: 13px;
    line-height: 2.2;
    letter-spacing: 0.04em;
    color: var(--ink);
    white-space: pre-wrap;
  }

  /* ナビゲーション */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(237,224,204,0.95);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(184,151,90,0.25);
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px 20px;
    z-index: 50;
  }
  .nav-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 20px;
    font-family: 'Shippori Mincho', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--sepia);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: rgba(184,151,90,0.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-counter {
    font-size: 11px;
    color: var(--sepia);
    letter-spacing: 0.08em;
  }

  /* PDF閲覧ボタン */
  .pdf-btn {
    display: block;
    margin: 24px auto 0;
    padding: 11px 28px;
    background: linear-gradient(135deg, #0a3d6b, #1a6b3a);
    color: #fff;
    border: none;
    border-radius: 24px;
    font-family: 'Shippori Mincho', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
  }

  /* フェードイン */
  .page { opacity: 0; transition: opacity 0.4s ease; }
  .page.visible { opacity: 1; }

  /* ページ下部の余白（nav-bar分）*/
  .page { padding-bottom: 80px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>香の書を開いています…</p>
</div>

<div id="error-view">
  <p>鑑定書が見つかりませんでした。<br>しばらくお待ちください。</p>
</div>

<div id="reading-view"></div>

<div class="nav-bar" id="nav-bar" style="display:none;">
  <button class="nav-btn" id="prev-btn" onclick="changePage(-1)" disabled>◁ 前へ</button>
  <span class="nav-counter" id="page-counter"></span>
  <button class="nav-btn" id="next-btn" onclick="changePage(1)">次へ ▷</button>
</div>

<script>
const LIFF_ID = '2009167670-UBoFZZVD';
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxW026ouK98jfy10wdraMV02X2lkb1ztN5QQy67t5ByHt6eiIrD6Plp6m4Tc50FdFTkSQ/exec';

let pages = [];
let currentPage = 0;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    const lineUserId = profile.userId;

    const res = await fetch(`${GAS_API_URL}?action=getReading&lineUserId=${encodeURIComponent(lineUserId)}`);
    const data = await res.json();

    if (!data.reading) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-view').style.display = 'flex';
      return;
    }

    renderReading(data.reading);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('reading-view').style.display = 'block';
    document.getElementById('nav-bar').style.display = 'flex';
    showPage(0);

  } catch(e) {
    console.error(e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-view').style.display = 'flex';
    document.getElementById('error-view').querySelector('p').textContent = 'エラーが発生しました。\n' + e.message;
  }
}

function renderReading(reading) {
  const container = document.getElementById('reading-view');
  pages = [];

  // 表紙
  const cover = document.createElement('div');
  cover.className = 'page cover-page';
  cover.innerHTML = `
    <div class="cover-seal">🕯️</div>
    <div style="margin-top:24px;">
      <div class="cover-title">薫音式 香星命学 鑑定書</div>
      <div class="cover-divider"></div>
      <div class="cover-meta">
        鑑定対象者：${reading.userName}様<br>
        鑑定日：${reading.readingDate}<br>
        鑑定者：香の巫女
      </div>
    </div>
  `;
  container.appendChild(cover);
  pages.push(cover);

  // 本文セクション
  if (reading.sections && reading.sections.length > 0) {
    reading.sections.forEach(section => {
      const pg = document.createElement('div');
      pg.className = 'page';
      pg.innerHTML = `
        <div class="page-divider"></div>
        <div class="section" style="margin-top:16px;">
          <div class="section-title">${section.title}</div>
          <div class="section-body">${section.body}</div>
        </div>
      `;
      container.appendChild(pg);
      pages.push(pg);
    });
  } else if (reading.content) {
    // sectionsがない場合はcontentを単一ページで表示
    const pg = document.createElement('div');
    pg.className = 'page';
    pg.innerHTML = `
      <div class="page-divider"></div>
      <div class="section" style="margin-top:16px;">
        <div class="section-body">${reading.content.replace(/\n/g, '<br>')}</div>
      </div>
    `;
    container.appendChild(pg);
    pages.push(pg);
  }

  // PDF閲覧ページ（URLがある場合）
  if (reading.pdfUrl) {
    const pdfPg = document.createElement('div');
    pdfPg.className = 'page';
    pdfPg.innerHTML = `
      <div class="page-divider"></div>
      <div style="text-align:center; margin-top:32px;">
        <div class="section-title" style="justify-content:center;">鑑定書 PDF</div>
        <p style="font-size:12px; color:var(--sepia); line-height:2; margin-bottom:4px;">
          鑑定書の完全版をPDFでご覧いただけます。
        </p>
        <a class="pdf-btn" href="${reading.pdfUrl}" target="_blank">🕯️ 鑑定書を開く</a>
      </div>
    `;
    container.appendChild(pdfPg);
    pages.push(pdfPg);
  }
}

function showPage(idx) {
  pages.forEach((p, i) => {
    p.classList.toggle('visible', i === idx);
    p.style.display = i === idx ? 'block' : 'none';
    if (i === 0) p.style.display = i === idx ? 'flex' : 'none';
  });
  currentPage = idx;
  document.getElementById('page-counter').textContent = `${idx + 1} / ${pages.length}`;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === pages.length - 1;
  setTimeout(() => pages[idx].classList.add('visible'), 10);
  window.scrollTo(0, 0);
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next >= 0 && next < pages.length) showPage(next);
}

init();
</script>
</body>
</html>
