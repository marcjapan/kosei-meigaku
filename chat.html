<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香星命学｜香の巫女に相談する</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --ash: #4a4440;
    --mist: #9a9490;
    --parchment: #f5f0e8;
    --cream: #faf7f2;
    --gold: #b8975a;
    --gold-light: #d4b07a;
    --border: #ddd8ce;
    --green-dark: #0a3d6b;
    --green: #1a6b3a;
    --bubble-user: #1a1410;
    --bubble-ai: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--cream);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(184,151,90,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(26,26,16,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ヘッダー */
  header {
    position: relative;
    z-index: 10;
    background: var(--ink);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(184,151,90,0.3);
  }

  .header-icon {
    width: 36px;
    height: 36px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header-icon span {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    color: var(--gold);
  }

  .header-text h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  .header-text p {
    font-size: 10px;
    color: rgba(184,151,90,0.6);
    letter-spacing: 0.05em;
    margin-top: 1px;
  }

  /* チャットエリア */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  /* メッセージバブル */
  .msg-wrap {
    display: flex;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.user {
    justify-content: flex-end;
  }

  .msg-wrap.ai {
    justify-content: flex-start;
    gap: 8px;
  }

  .ai-avatar {
    width: 32px;
    height: 32px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--ink);
    margin-top: 2px;
  }

  .ai-avatar span {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    color: var(--gold);
  }

  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.8;
    letter-spacing: 0.03em;
  }

  .bubble.user {
    background: #ffffff;
    color: var(--ink);
    border: 1.5px solid var(--border);
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .bubble.ai {
    background: linear-gradient(135deg, #e8f5ee 0%, #f0faf4 100%);
    color: var(--ink);
    border: 1px solid rgba(26,107,58,0.15);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(26,107,58,0.08);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--mist);
    margin-top: 4px;
    text-align: right;
  }

  .msg-wrap.ai .bubble-time {
    text-align: left;
    margin-left: 40px;
  }

  /* タイピングインジケーター */
  .typing-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: flex-start;
  }

  .typing-bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-bubble span {
    width: 6px;
    height: 6px;
    background: var(--mist);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* 区切り線 */
  .divider {
    text-align: center;
    margin: 20px 0;
    position: relative;
  }

  .divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    background: var(--cream);
    padding: 0 12px;
    font-size: 11px;
    color: var(--mist);
    position: relative;
    letter-spacing: 0.05em;
  }

  /* お試し残り回数 */
  .trial-notice {
    text-align: center;
    padding: 8px 16px;
    background: rgba(184,151,90,0.08);
    border: 1px solid rgba(184,151,90,0.2);
    border-radius: 8px;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }

  /* 入力エリア */
  #input-area {
    position: relative;
    z-index: 10;
    background: var(--cream);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }

  .input-inner {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    transition: border-color 0.2s;
  }

  .input-inner:focus-within {
    border-color: var(--gold);
  }

  #msg-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--ink);
    background: transparent;
    resize: none;
    max-height: 100px;
    line-height: 1.6;
  }

  #msg-input::placeholder {
    color: var(--mist);
    font-size: 13px;
  }

  #send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  #send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #send-btn:not(:disabled):active {
    transform: scale(0.92);
  }

  #send-btn svg {
    width: 16px;
    height: 16px;
  }

  /* ローディング */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--mist);
    font-size: 13px;
  }

  .loading-mark {
    width: 48px;
    height: 48px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 2s infinite;
  }

  .loading-mark span {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    color: var(--gold);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(184,151,90,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(184,151,90,0); }
  }

  /* エラー */
  #error-msg {
    display: none;
    text-align: center;
    padding: 40px 24px;
    color: var(--ash);
    font-size: 13px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<header>
  <div class="header-icon"><span>香</span></div>
  <div class="header-text">
    <h1>香の巫女に相談する</h1>
    <p>この対話はあなただけのものです</p>
  </div>
</header>

<div id="chat-area">
  <div id="loading">
    <div class="loading-mark"><span>香</span></div>
    <span>つながっています…</span>
  </div>
  <div id="error-msg">
    <p>接続できませんでした。<br>マイページから再度お試しください。</p>
  </div>
</div>

<div id="input-area" style="display:none;">
  <div class="input-inner">
    <textarea id="msg-input" rows="1" placeholder="心の中にあることを話してください…" maxlength="500"></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
const LIFF_ID = '2009167670-MoFBVq6M';
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzs6k1RpPw2CgZqQmkSVBjHrXbLeO5WCuU3nKBu0Ga7TFjKyOHdfoatt7kdlMiEL4sR0Q/exec'; // ユーザー情報取得用
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwiDcr2nqVJa3U_dIRblveFdnAZjnGKkYRRNAS3OI8G7exBOs60eagkAJ1IHDjalLbOTA/exec'; // チャット用

let lineUserId = null;
let userName = null;
let isSending = false;
let lastNudgeIdx = -1;

const chatArea = document.getElementById('chat-area');
const inputArea = document.getElementById('input-area');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const loading = document.getElementById('loading');
const errorMsg = document.getElementById('error-msg');

const NUDGES = [
  '他に話したいことがあれば、聞かせてください。',
  '続きがあれば、ここで話してもらえると嬉しいです。',
  'もう少し、ここにいますよ。',
  '話せそうなことがあれば、聞かせてください。',
  '他にも感じていることがあれば、遠慮なく話してください。',
  '気になることがあれば、何でも聞かせてください。'
];

function pickNudge() {
  let idx;
  do { idx = Math.floor(Math.random() * NUDGES.length); } while (idx === lastNudgeIdx);
  lastNudgeIdx = idx;
  return NUDGES[idx];
}

function formatTime(date) {
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  return `${h}:${m}`;
}

function addMessage(role, text, showNudge = false) {
  const now = new Date();
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  if (role === 'ai') {
    const avatar = document.createElement('div');
    avatar.className = 'ai-avatar';
    avatar.innerHTML = '<span>香</span>';
    wrap.appendChild(avatar);
  }

  const inner = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;
  inner.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.textContent = formatTime(now);
  inner.appendChild(time);

  wrap.appendChild(inner);
  chatArea.appendChild(wrap);

  if (role === 'ai' && showNudge) {
    setTimeout(() => {
      const nudgeWrap = document.createElement('div');
      nudgeWrap.className = 'msg-wrap ai';

      const avatar2 = document.createElement('div');
      avatar2.className = 'ai-avatar';
      avatar2.innerHTML = '<span>香</span>';
      nudgeWrap.appendChild(avatar2);

      const inner2 = document.createElement('div');
      const nudgeBubble = document.createElement('div');
      nudgeBubble.className = 'bubble ai';
      nudgeBubble.textContent = pickNudge();
      inner2.appendChild(nudgeBubble);

      const time2 = document.createElement('div');
      time2.className = 'bubble-time';
      time2.textContent = formatTime(new Date());
      inner2.appendChild(time2);

      nudgeWrap.appendChild(inner2);
      chatArea.appendChild(nudgeWrap);
      scrollToBottom();
    }, 800);
  }

  scrollToBottom();
}

function showTyping() {
  const typingWrap = document.createElement('div');
  typingWrap.className = 'typing-wrap';
  typingWrap.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'ai-avatar';
  avatar.innerHTML = '<span>香</span>';
  typingWrap.appendChild(avatar);

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  typingWrap.appendChild(bubble);

  chatArea.appendChild(typingWrap);
  scrollToBottom();
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isSending) return;

  isSending = true;
  sendBtn.disabled = true;
  msgInput.value = '';
  msgInput.style.height = 'auto';

  addMessage('user', text);
  showTyping();

  try {
    const params = new URLSearchParams({
      action: 'chat',
      lineUserId,
      message: text
    });
    const res = await fetch(WEBHOOK_URL + '?' + params.toString());
    const rawText = await res.text();
    let data;
    try { data = JSON.parse(rawText); } catch(e) { data = {}; }
    hideTyping();

    if (data.reply) {
      addMessage('ai', data.reply, true);
      if (data.trialRemaining !== undefined) {
        const notice = document.createElement('div');
        notice.className = 'trial-notice';
        notice.textContent = data.trialRemaining > 0
          ? `＊お試し対話 残り${data.trialRemaining}回`
          : '＊次回から本格鑑定が必要です';
        chatArea.appendChild(notice);
        scrollToBottom();
      }
    } else if (data.error === 'trial_ended') {
      addMessage('ai', '本格鑑定をご購入いただくと、1ヶ月間、香の巫女との対話が無制限でご利用いただけます🕯️', false);
    } else {
      // デバッグ用：レスポンス内容を表示
      addMessage('ai', 'DBG:' + rawText.substring(0, 200), false);
    }
  } catch(e) {
    hideTyping();
    addMessage('ai', 'CATCH:' + e.toString(), false);
  }

  isSending = false;
  sendBtn.disabled = msgInput.value.trim().length === 0;
}

// テキストエリア自動リサイズ
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  sendBtn.disabled = msgInput.value.trim().length === 0;
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// LIFF初期化
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    // ユーザー情報取得
    let data;
    try {
      const res = await fetch(`${GAS_API_URL}?action=getUserByLineId&lineUserId=${encodeURIComponent(lineUserId)}`);
      const text = await res.text();
      data = JSON.parse(text);
    } catch(fetchErr) {
      loading.style.display = 'none';
      errorMsg.innerHTML = 'fetch error: ' + fetchErr.toString();
      errorMsg.style.display = 'block';
      return;
    }

    loading.style.display = 'none';

    if (!data.user) {
      errorMsg.innerHTML = 'user error: ' + JSON.stringify(data);
      errorMsg.style.display = 'block';
      return;
    }

    userName = data.user.name;

    // 区切り線
    const divider = document.createElement('div');
    divider.className = 'divider';
    divider.innerHTML = '<span>香の巫女との対話</span>';
    chatArea.appendChild(divider);

    // 入力エリア表示
    inputArea.style.display = 'block';

    // 最初の挨拶
    const hour = new Date().getHours();
    const greeting = hour < 11 ? 'おはようございます' : hour < 17 ? 'こんにちは' : 'こんばんは';
    setTimeout(() => {
      addMessage('ai', `${greeting}、${userName}さん。心の中にあることを、ゆっくり話してください。`);
    }, 400);

  } catch(e) {
    console.error(e);
    loading.style.display = 'none';
    errorMsg.innerHTML = 'init catch: ' + e.toString();
    errorMsg.style.display = 'block';
  }
}

init();
</script>
</body>
</html>
